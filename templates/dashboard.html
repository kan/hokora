{{define "content"}}
<h1>プロジェクト</h1>
<table>
  <thead><tr><th>slug</th><th>名前</th><th>環境</th><th>item</th><th></th></tr></thead>
  <tbody>
  {{range .Projects}}
    <tr>
      <td><a href="/ui/projects/{{.Slug}}">{{.Slug}}</a></td>
      <td>{{.Name}}</td>
      <td class="num">{{.Envs}}</td>
      <td class="num">{{.Items}}</td>
      <td>
        <form method="post" action="/ui/projects/{{.Slug}}/delete" class="inline">
          {{template "csrf" $.CSRFToken}}
          <button type="submit" class="danger">削除</button>
        </form>
      </td>
    </tr>
  {{else}}
    <tr><td colspan="5" class="empty">プロジェクトがありません。</td></tr>
  {{end}}
  </tbody>
</table>

<h2>プロジェクトを作成</h2>
<form method="post" action="/ui/projects" class="card">
  {{template "csrf" .CSRFToken}}
  <label>slug <input type="text" name="slug" required pattern="[a-z0-9][a-z0-9-]*"></label>
  <label>名前 <input type="text" name="name"></label>
  <button type="submit">作成</button>
</form>
{{end}}
