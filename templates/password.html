{{define "content"}}
<h1>パスワード変更</h1>
{{if .User.MustChangePW}}<p class="notice">初回ログインです。パスワードを変更してください。</p>{{end}}
<form method="post" action="/ui/password" class="card">
  {{template "csrf" .CSRFToken}}
  <label>現在のパスワード <input type="password" name="current_password" autocomplete="current-password" required></label>
  <label>新しいパスワード <input type="password" name="new_password" autocomplete="new-password" required></label>
  <label>新しいパスワード(確認) <input type="password" name="confirm_password" autocomplete="new-password" required></label>
  <p class="hint">12 文字以上。</p>
  <button type="submit">変更する</button>
</form>
{{end}}
