{{define "content"}}
<h1>{{.Key}} の履歴</h1>
<p class="crumbs"><a href="/ui/projects/{{.Env.ProjectSlug}}/{{.Env.EnvSlug}}">{{.Env.ProjectSlug}} / {{.Env.EnvSlug}}</a> / {{.Key}}</p>

<table>
  <thead><tr><th>版</th><th>作成</th><th>作成者</th><th></th></tr></thead>
  <tbody>
  {{range .Versions}}
    <tr>
      <td class="num">{{.Version}}{{if .Current}} <span class="badge">現行</span>{{end}}</td>
      <td>{{formatTime .CreatedAt}}</td>
      <td>{{.CreatedBy}}</td>
      <td>
        <form method="post" action="/ui/projects/{{$.Env.ProjectSlug}}/{{$.Env.EnvSlug}}/items/{{$.Key}}/history/{{.Version}}/reveal" class="inline">
          {{template "csrf" $.CSRFToken}}
          <button type="submit">表示</button>
        </form>
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
{{end}}
